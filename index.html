// 🔥 RANDOM CÓ SEED (KHÔNG LẶP)
function seededRandom(seed) {
    let x = Math.sin(seed) * 10000;
    return x - Math.floor(x);
}

function shuffleBySeed(arr, seed){
    const newArr = [...arr];

    for(let i = newArr.length - 1; i > 0; i--){
        const j = Math.floor(seededRandom(seed + i) * (i + 1));
        [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
    }

    return newArr;
}

function pickBySeed(arr, seed){
    if(!arr || arr.length === 0){

        const fallbackText = [
    "📌 Ngày hôm nay mang tính ổn định, nên giữ nhịp đều.",
    "🔍 Vận trình không nổi bật, cần quan sát kỹ trước khi quyết định.",
    "⚖️ Trạng thái cân bằng, không nên vội vàng thay đổi.",
    "🧭 Thời điểm thích hợp để chuẩn bị hơn là bứt phá.",
    "📖 Nên hoàn thiện những việc còn dang dở."
    ];
        return fallbackText[seed % fallbackText.length];
    }

    const index = Math.floor(seededRandom(seed) * arr.length);
    return arr[index];
}

function getDayCanChi(d){
    let x=new Date(d);

// ====== TÍNH JULIAN DAY ======
function jdFromDate(dd, mm, yy) {
    let a = Math.floor((14 - mm) / 12);
    let y = yy + 4800 - a;
    let m = mm + 12 * a - 3;
    return dd + Math.floor((153 * m + 2) / 5) + 365 * y
        + Math.floor(y / 4) - Math.floor(y / 100)
        + Math.floor(y / 400) - 32045;
}

// ====== TÍNH GÓC MẶT TRỜI ======
function sunLongitude(jdn) {
    let T = (jdn - 2451545.0) / 36525;
    let T2 = T * T;

    let dr = Math.PI / 180;
    let M = 357.52910 + 35999.05030 * T - 0.0001559 * T2;
    let L0 = 280.46645 + 36000.76983 * T;

    let DL = (1.914600 - 0.004817 * T) * Math.sin(dr * M)
        + (0.019993 - 0.000101 * T) * Math.sin(dr * 2 * M)
        + 0.000290 * Math.sin(dr * 3 * M);

    let L = L0 + DL;
    L = L * dr;
    L = L - Math.PI * 2 * Math.floor(L / (Math.PI * 2));

    return L;
}

function hashString(str){
    let hash = 0;
    for(let i = 0; i < str.length; i++){
        hash = str.charCodeAt(i) + ((hash << 5) - hash);
    }
    return Math.abs(hash);
}

};
function getAIContent(type, eU, finalS, seed){
    let level = "mid";

    if(finalS >= 8) level = "good";
    else if(finalS <= 4) level = "bad";

    let source;

    if(level === "good"){
        source = aiContent[type]?.good?.[eU];
    } 
    else if(level === "bad"){
        source = aiContent[type]?.bad?.[eU];
    } 
    else {
        const good = aiContent[type]?.good?.[eU] || [];
        const bad = aiContent[type]?.bad?.[eU] || [];
        source = [...good.slice(0,2), ...bad.slice(0,1)];
    }

    // 🧯 fallback chống crash
    if(!source || source.length === 0){
        return "📌 Ngày ở trạng thái trung bình, tránh quá nhiều sự thay đổi";
    }

    const index = (seed + type.length + eU.length) % source.length;
    return source[index];
}

function humanize(text, seed){
    const variants = ["Bạn", "Có vẻ bạn", "Dường như bạn"];
    const s = typeof seed === "number" ? seed : 0;
    return text.replace("Bạn", variants[s % variants.length]);
}

function get2Content(type, eU, finalS, seed){
    const text1 = humanize(getAIContent(type, eU, finalS, seed), seed);
    let   text2 = humanize(getAIContent(type, eU, finalS, seed + 7), seed + 1);
    if(text1 === text2){
        text2 = humanize(getAIContent(type, eU, finalS, seed + 13), seed + 2);
    }
    return buildNarrative(type, [text1, text2], finalS, seed);
}

    // Tiết khí tháng → chi tháng
    const tkMonths = [
        {m:1,d:5,chi:1},{m:2,d:4,chi:2},{m:3,d:6,chi:3},

        {m:10,d:8,chi:10},{m:11,d:7,chi:11},{m:12,d:7,chi:0}
    ];
    let monthChi = 0;
    for(let i = tkMonths.length-1; i>=0; i--){
        if(m > tkMonths[i].m || (m===tkMonths[i].m && day>=tkMonths[i].d)){
            monthChi = tkMonths[i].chi; break;
        }
    }
    const [,chDay] = getDayCanChi(dateStr);
    const dayChiIdx = chi.indexOf(chDay);
    return trucArr[(dayChiIdx - monthChi + 12) % 12];
}

function helperThaiTue(chiSinh, chiNamXem) 

{
    const chiArr = ["Tý", "Sửu", "Dần", "Mão", "Thìn", "Tỵ", "Ngọ", "Mùi", "Thân", "Dậu", "Tuất", "Hợi"];
    
    const idxSinh = chiArr.indexOf(chiSinh);
    const idxNam = chiArr.indexOf(chiNamXem);
    
    // Nếu không tìm thấy địa chi phù hợp (hoặc nhập sai từ ngữ)
    if (idxSinh === -1 || idxNam === -1) {
        return { pham: false, loai: "Không phạm Thái Tuế" };
    }

    // 1. Kiểm tra XUNG THÁI TUẾ (Lục Xung - Khoảng cách giữa 2 chi là 6)
    if (Math.abs(idxSinh - idxNam) === 6) {
        return { pham: true, loai: "Xung Thái Tuế" };
    }

    // 2. Kiểm tra TRỰC THÁI TUẾ (Tuổi trùng năm xem)
    if (idxSinh === idxNam) {
        return { pham: true, loai: "Trực Thái Tuế" };
    }

    // 3. Kiểm tra HÌNH THÁI TUẾ (Các trường hợp Tam Hình chuẩn)
    // Cặp Tý (0) - Mão (3) hình nhau
    if ((idxNam === 0 && idxSinh === 3) || (idxNam === 3 && idxSinh === 0)) {
        return { pham: true, loai: "Hình Thái Tuế" };
    }
    
    // Bộ ba Dần (2) - Tỵ (5) - Thân (8)
    if (idxNam === 2 && idxSinh === 8) return { pham: true, loai: "Hình Thái Tuế" }; // Năm Dần - Tuổi Thân bị hình
    if (idxNam === 5 && idxSinh === 2) return { pham: true, loai: "Hình Thái Tuế" }; // Năm Tỵ - Tuổi Dần bị hình
    if (idxNam === 8 && idxSinh === 5) return { pham: true, loai: "Hình Thái Tuế" }; // Năm Thân - Tuổi Tỵ bị hình

    // Bộ ba Sửu (1) - Mùi (7) - Tuất (10)
    if (idxNam === 1 && idxSinh === 7) return { pham: true, loai: "Hình Thái Tuế" };  // Năm Sửu - Tuổi Mùi bị hình
    if (idxNam === 10 && idxSinh === 1) return { pham: true, loai: "Hình Thái Tuế" }; // Năm Tuất - Tuổi Sửu bị hình
    if (idxNam === 7 && idxSinh === 10) return { pham: true, loai: "Hình Thái Tuế" }; // Năm Mùi - Tuổi Tuất bị hình


    // 4. Kiểm tra HẠI THÁI TUẾ (Lục Hại)
    const lucHaiMap = {
        0: 7,  // Tý - Mùi
        1: 6,  // Sửu - Ngọ
        2: 5,  // Dần - Tỵ
        3: 4,  // Mão - Thìn
        8: 11, // Thân - Hợi
        9: 10  // Dậu - Tuất
    };
    if (lucHaiMap[idxNam] === idxSinh || lucHaiMap[idxSinh] === idxNam) {
        return { pham: true, loai: "Hại Thái Tuế" };
    }

    // 5. Kiểm tra PHÁ THÁI TUẾ (Lục Phá)
    const lucPhaPairs = [
        [0, 9],  // Tý - Dậu
        [3, 6],  // Mão - Ngọ
        [1, 4],  // Sửu - Thìn
        [7, 10], // Mùi - Tuất
        [2, 11], // Dần - Hợi
        [5, 8]   // Tỵ - Thân
    ];
    const laPha = lucPhaPairs.some(pair => (pair[0] === idxNam && pair[1] === idxSinh) || (pair[0] === idxSinh && pair[1] === idxNam));
    if (laPha) {
        return { pham: true, loai: "Phá Thái Tuế" };
    }

    // Không phạm mối quan hệ nào ở trên
    return { pham: false, loai: "Không phạm Thái Tuế" };
}

    : DATA_THAI_TUE["Không phạm Thái Tuế"];


    let textHTML = `

        <hr style="border:0; border-top:1px dashed #cbd5e1; margin:10px 0;">
        
        <p><b>1. Bản Mệnh Tương Quan Ngày:</b> Bạn mang bản mệnh <b>${nU} (${eU})</b> gặp ngày xem mang năng lượng tinh khí <b>${nD} (${eD})</b>. Hệ thống dữ liệu AI ghi nhận dòng năng lượng của ngày có sự tương tác trực tiếp lên bản thể của bạn, cực kỳ thích hợp để tập trung giải quyết các mục tiêu ngắn hạn vững chắc.</p>
        
        <p><b>2. Tổng Quan Sao Hạn Năm Xem (${canChiXem[0]} Ngọ ${viewYear}):</b> Năm nay bản chủ bước vào tuổi mụ thứ <b>${ageTa}</b>, bị quản thúc bởi tinh tú <b>${sh.sao}</b> và vận hạn niên là <b>${sh.han}</b>.
        <br><i>Nhận định chuyên sâu:</i> Đối với hành trạng của người tuổi ${chU} ${genderV === 'Nam' ? 'Nam mạng' : 'Nữ mạng'}, hệ sao này nhắc nhở: ${DATA_SAO_CUU_DIEU[sh.sao][genderV]} 
        Đồng thời, cần chú ý thêm về hạn niên ${sh.han}.
        <br>⚠️ <b>AI cảnh báo mốc thời gian động:</b> ${DATA_SAO_CUU_DIEU[sh.sao].chuy}</p>
        
        <p><b>3. Trạch Cát Đại Sự (Kim Lâu - Hoang Ốc):</b> Xét trên vòng xoay trạch cát xây dựng, tuổi của bạn năm nay rơi vào trạng thái <b>${kl.loai}</b> và cung Hoang Ốc là <b>${ho.name}</b>.
        ${kl.pham || ho.pham ? `<br>❌ <span style="color:#b91c1c; font-weight:bold;">Phạm cấm kỵ đại sự:</span> Dòng khí năm nay không thuận cho việc đứng tên động thổ, cất nhà hay mua bán bất động sản quy mô lớn. Lời khuyên từ AI là nếu bắt buộc phải làm, bản chủ nên tiến hành mượn tuổi người hợp mệnh để khởi công nhằm chu toàn đại sự.` : `<br>✅ <span style="color:#16a34a; font-weight:bold;">Vận trạch hanh thông:</span> Không phạm các đại hạn trạch cát xây cất, thuận lợi tạo lập cơ đồ vững bền.`}</p>
        
		<p> <b>🔸 Tam Tai:</b><br>
${
    tamTaiInfo.pham
    ? `❌ Phạm Tam Tai (${tamTaiInfo.years.join(" → ")})
       <br><b>${tamTaiInfo.giaiDoan}</b>
       <br>${tamTaiInfo.moTa}`
    : `✅ Không phạm Tam Tai
       <br>${tamTaiInfo.moTa}`
}
</p>

<p>
<b>🔸 Thái Tuế:</b>
${
    thaiTue.pham
    ? `❌ <b>${thaiTue.loai}</b> ${thaiTueText.level}<br>
       ${thaiTueText.text}`
    : `✅ Không phạm Thái Tuế<br>
       ${thaiTueText.text}`
}
</p>
        <p><b>4. Chiến Lược Tổng Thể:</b> Nếu biết kết hợp toàn bộ các mục nạp âm thời gian, AI đề xuất bạn nên dĩ tĩnh chế động vào các tháng kỵ của sao chiếu mệnh, giữ gìn sức khỏe hệ xương khớp/máu huyết, đồng thời luôn minh bạch hóa chứng từ tài chính để đạt được hiệu quả bảo toàn tài sản tốt nhất.</p>
    `;

    document.getElementById("out").innerHTML = `
        <div class="result-card good" style="margin-top:25px; border-radius:20px; overflow:hidden; color:white; animation: slideUp 0.6s ease;">
            <div class="header-info" style="background: linear-gradient(45deg, #7c3aed, #db2777); padding:20px;">
                🔮 <b>KHÔNG GIAN AI LUẬN GIẢI TỔNG HỢP</b><br>
                📅 Ngày xem: <b>${cD} ${chD}</b> | 👤 Bản mệnh: <b>${cU} ${chU} (${genderV})</b>
            </div>
            <div class="luan-content" style="background:#fff; color:#0f172a; padding:20px; line-height:1.7; font-size:13.5px; text-align:left;">
                ${textHTML}
            </div>
        </div>
    `;
    if(chart) chart.destroy();
    document.getElementById("chart-wrap").style.display = "none";
}

window.onload = () => {
    document.getElementById("date").value =
        new Date().toISOString().split('T')[0];
};
</script>
